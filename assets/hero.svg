<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" width="1280" height="420" role="img" aria-label="Awesome Long-Horizon Agents — A Survey">
  <title>Awesome Long-Horizon Agents — A Survey</title>
  <desc>A clean aurora banner: a soft animated gradient wash, a faint perspective grid, and an animated shiny gradient wordmark "LONG-HORIZON AGENTS" with the six survey perspectives beneath it.</desc>

  <defs>
    <!-- deep, calm base backdrop -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#0e1530"/>
      <stop offset="1"   stop-color="#0a0f24"/>
    </linearGradient>

    <!-- aurora blobs -->
    <radialGradient id="au1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7C4DC4" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#7C4DC4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="au2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#37D2A6" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#37D2A6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="au3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4472C4" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#4472C4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="au4" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#E84393" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#E84393" stop-opacity="0"/>
    </radialGradient>

    <!-- wordmark gradient (the "shiny" ink) -->
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#8fe9ff"/>
      <stop offset="0.35" stop-color="#a99bff"/>
      <stop offset="0.65" stop-color="#ff9ad5"/>
      <stop offset="1"    stop-color="#ffd59e"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1"   stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="titleClip">
      <text x="640" y="196" text-anchor="middle" font-family="'Arial Black',Impact,'Helvetica Neue',sans-serif"
            font-size="72" font-weight="900" letter-spacing="3">LONG&#8209;HORIZON AGENTS</text>
    </clipPath>
    <clipPath id="rollClip"><rect x="686" y="238" width="360" height="34"/></clipPath>

    <style>
      .drift1{animation:d1 14s ease-in-out infinite}
      .drift2{animation:d2 18s ease-in-out infinite}
      .drift3{animation:d3 16s ease-in-out infinite}
      .drift4{animation:d4 20s ease-in-out infinite}
      @keyframes d1{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,20px)}}
      @keyframes d2{0%,100%{transform:translate(0,0)}50%{transform:translate(-50px,30px)}}
      @keyframes d3{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-24px)}}
      @keyframes d4{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,-18px)}}
      .grid{animation:scroll 3s linear infinite}
      @keyframes scroll{from{transform:translateY(0)}to{transform:translateY(20px)}}
      .sweep{animation:sweep 5.5s ease-in-out infinite}
      @keyframes sweep{0%{transform:translateX(-520px)}55%{transform:translateX(760px)}100%{transform:translateX(760px)}}
      .roll{animation:roll 13.2s cubic-bezier(.22,1,.36,1) infinite}
      @keyframes roll{
        0%,12%{transform:translateY(0)} 14.7%,26.6%{transform:translateY(-34px)}
        29.3%,41.3%{transform:translateY(-68px)} 44%,56%{transform:translateY(-102px)}
        58.6%,70.6%{transform:translateY(-136px)} 73.3%,85.3%{transform:translateY(-170px)}
        88%,100%{transform:translateY(-204px)}
      }
      .tw{animation:tw 3.4s ease-in-out infinite}
      .tw2{animation:tw 3.4s ease-in-out infinite;animation-delay:1.1s}
      .tw3{animation:tw 3.4s ease-in-out infinite;animation-delay:2.2s}
      @keyframes tw{0%,100%{opacity:.15}50%{opacity:.9}}
    </style>
  </defs>

  <!-- backdrop -->
  <rect x="2" y="2" width="1276" height="416" rx="28" fill="url(#bg)"/>

  <!-- aurora field (clipped to rounded card) -->
  <clipPath id="card"><rect x="2" y="2" width="1276" height="416" rx="28"/></clipPath>
  <g clip-path="url(#card)">
    <g filter="url(#soft)">
      <ellipse class="drift1" cx="300"  cy="140" rx="260" ry="150" fill="url(#au1)"/>
      <ellipse class="drift2" cx="1000" cy="120" rx="280" ry="160" fill="url(#au3)"/>
      <ellipse class="drift3" cx="760"  cy="300" rx="300" ry="150" fill="url(#au2)"/>
      <ellipse class="drift4" cx="230"  cy="320" rx="240" ry="140" fill="url(#au4)"/>
    </g>

    <!-- faint perspective grid on the floor -->
    <g clip-path="url(#card)" opacity="0.35">
      <g stroke="#8aa0ff" stroke-width="1">
        <line x1="640" y1="300" x2="-160" y2="420"/>
        <line x1="640" y1="300" x2="140"  y2="420"/>
        <line x1="640" y1="300" x2="380"  y2="420"/>
        <line x1="640" y1="300" x2="540"  y2="420"/>
        <line x1="640" y1="300" x2="640"  y2="420"/>
        <line x1="640" y1="300" x2="740"  y2="420"/>
        <line x1="640" y1="300" x2="900"  y2="420"/>
        <line x1="640" y1="300" x2="1140" y2="420"/>
        <line x1="640" y1="300" x2="1440" y2="420"/>
      </g>
      <g class="grid" stroke="#8aa0ff" stroke-width="1">
        <line x1="0" y1="308" x2="1280" y2="308"/>
        <line x1="0" y1="320" x2="1280" y2="320"/>
        <line x1="0" y1="336" x2="1280" y2="336"/>
        <line x1="0" y1="358" x2="1280" y2="358"/>
        <line x1="0" y1="388" x2="1280" y2="388"/>
        <line x1="0" y1="428" x2="1280" y2="428"/>
      </g>
    </g>

    <!-- stars -->
    <g fill="#ffffff">
      <circle class="tw"  cx="120"  cy="70"  r="1.5"/>
      <circle class="tw2" cx="1160" cy="60"  r="1.4"/>
      <circle class="tw3" cx="1040" cy="40"  r="1.2"/>
      <circle class="tw"  cx="220"  cy="40"  r="1.2"/>
      <circle class="tw2" cx="60"   cy="150" r="1.3"/>
      <circle class="tw3" cx="1220" cy="150" r="1.3"/>
    </g>
  </g>

  <!-- eyebrow -->
  <text x="640" y="96" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="15" font-weight="700" letter-spacing="10" fill="#8fe9ff" filter="url(#glow)">A W E S O M E &#160;&#183;&#160; A &#160; S U R V E Y</text>

  <!-- wordmark -->
  <g filter="url(#glow)">
    <text x="640" y="196" text-anchor="middle" font-family="'Arial Black',Impact,'Helvetica Neue',sans-serif"
          font-size="72" font-weight="900" letter-spacing="3" fill="url(#ink)">LONG&#8209;HORIZON AGENTS</text>
  </g>
  <!-- shiny sweep across the wordmark -->
  <g clip-path="url(#titleClip)"><rect class="sweep" x="0" y="120" width="150" height="100" fill="url(#sheen)"/></g>

  <!-- subtitle: Toward + rotating perspectives -->
  <text x="676" y="264" text-anchor="end" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="26" font-weight="600" fill="#d7def7">Toward</text>
  <g clip-path="url(#rollClip)">
    <g class="roll">
      <text x="690" y="264" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="26" font-weight="800" fill="#8fe9ff" filter="url(#glow)">Foundations.</text>
      <text x="690" y="298" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="26" font-weight="800" fill="#7fd8ff" filter="url(#glow)">Evolution.</text>
      <text x="690" y="332" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="26" font-weight="800" fill="#ffb27a" filter="url(#glow)">Harnesses.</text>
      <text x="690" y="366" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="26" font-weight="800" fill="#ffd15e" filter="url(#glow)">Optimization.</text>
      <text x="690" y="400" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="26" font-weight="800" fill="#ff9ad5" filter="url(#glow)">Applications.</text>
      <text x="690" y="434" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="26" font-weight="800" fill="#c79bff" filter="url(#glow)">Frontiers.</text>
      <text x="690" y="468" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="26" font-weight="800" fill="#8fe9ff" filter="url(#glow)">Foundations.</text>
    </g>
  </g>

  <!-- six perspective dots -->
  <g>
    <circle cx="536" cy="312" r="5" fill="#8fe9ff"/>
    <circle cx="558" cy="312" r="5" fill="#7fd8ff"/>
    <circle cx="580" cy="312" r="5" fill="#ffb27a"/>
    <circle cx="602" cy="312" r="5" fill="#ffd15e"/>
    <circle cx="624" cy="312" r="5" fill="#ff9ad5"/>
    <circle cx="646" cy="312" r="5" fill="#c79bff"/>
  </g>

  <!-- equation strip -->
  <text x="640" y="360" text-anchor="middle" font-family="'SF Mono','Menlo',monospace"
        font-size="15" font-weight="600" letter-spacing="1" fill="#aeb9e0">Long&#8209;Horizon Agency  =  Model Policy  &#8853;  Harness  &#8853;  Optimization</text>
</svg>
